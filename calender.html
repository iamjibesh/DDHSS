    <style>
      /* Calendar Container */
      .calendar-wrapper {
        max-width: 600px;
        width: 92%;
        margin: 100px auto 50px auto;
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        font-family: "Poppins", sans-serif;
      }

      /* Vibrant Header Section */
      .calendar-header {
        background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
        color: white;
        padding: 30px 20px;
        text-align: center;
        position: relative;
      }

      .school-logo {
        width: 60px;
        height: auto;
        margin-bottom: 10px;
        filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
      }

      .school-name-badge {
        background: rgba(255, 255, 255, 0.2);
        padding: 5px 12px;
        border-radius: 50px;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 600;
        display: inline-block;
        margin-bottom: 15px;
      }

      .month-year-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #month-year {
        font-size: 1.6rem;
        font-weight: 800;
        margin: 0;
        letter-spacing: 0.5px;
      }

      #prev,
      #next {
        background: rgba(255, 255, 255, 0.15);
        color: white;
        border: none;
        width: 45px;
        height: 45px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 1.2rem;
      }

      #prev:hover,
      #next:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: translateY(-2px);
      }

      #prev:disabled,
      #next:disabled {
        background: rgba(255, 255, 255, 0.05);
        color: rgba(255, 255, 255, 0.3);
        cursor: not-allowed;
        transform: none;
      }

      /* Calendar Body */
      .calendar-body {
        padding: 25px 30px 35px 30px;
      }

      /* Grid Setup */
      #calendar {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 8px;
        text-align: center;
      }

      .weekday {
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #94a3b8;
        padding-bottom: 10px;
      }

      .day {
        aspect-ratio: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        background: transparent;
        cursor: pointer;
        font-weight: 600;
        color: #334155;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        font-size: 1rem;
        border: 2px solid transparent;
      }

      .day:hover {
        background: #f1f5f9;
        transform: translateY(-2px);
        border-color: #e2e8f0;
      }

      /* Deep Pastel Holidays */
      .sunday {
        color: #ef4444;
      }

      .fully-closed-holiday {
        background: #ffe4e6;
        color: #be123c;
      }
      .fully-closed-holiday:hover {
        background: #fecdd3;
        border-color: #fda4af;
      }

      .observable-holiday {
        background: #fef3c7;
        color: #b45309;
      }
      .observable-holiday:hover {
        background: #fde68a;
        border-color: #fcd34d;
      }

      .multiple-holiday {
        background: #e0e7ff;
        color: #3730a3;
      }
      .multiple-holiday:hover {
        background: #c7d2fe;
        border-color: #a5b4fc;
      }

      /* Touch Instruction */
      .touch-instruction {
        text-align: center;
        font-size: 0.85rem;
        color: #64748b;
        margin-top: 25px;
        margin-bottom: 10px;
        font-weight: 500;
      }

      /* Elegant Pill Legend */
      .holiday-legend {
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .legend-pill {
        font-size: 0.75rem;
        font-weight: 600;
        padding: 6px 12px;
        border-radius: 50px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .legend-pill.full {
        background: #ffe4e6;
        color: #e11d48;
      }
      .legend-pill.obs {
        background: #fef3c7;
        color: #d97706;
      }
      .legend-pill.mult {
        background: #e0e7ff;
        color: #4f46e5;
      }

      /* The Sleek Toast Modal */
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(4px);
        z-index: 999;
        display: none;
      }

      .toast-modal {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        max-width: 400px;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        z-index: 1000;
        padding: 20px;
        animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes slideUp {
        from {
          transform: translate(-50%, -40%);
          opacity: 0;
        }
        to {
          transform: translate(-50%, -50%);
          opacity: 1;
        }
      }

      .toast-content-wrapper {
        display: flex;
        align-items: flex-start;
        gap: 15px;
      }

      .toast-icon {
        background: #eff6ff;
        color: #3b82f6;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        flex-shrink: 0;
      }

      .toast-text {
        flex-grow: 1;
      }

      .toast-title {
        margin: 0 0 5px 0;
        font-size: 1rem;
        font-weight: 700;
        color: #0f172a;
      }

      #holiday-reason {
        margin: 0;
        font-size: 0.9rem;
        color: #475569;
        line-height: 1.6;
        font-weight: 500;
      }

      .close-btn {
        background: none;
        border: none;
        color: #94a3b8;
        font-size: 1.5rem;
        cursor: pointer;
        padding: 0;
        line-height: 1;
        transition: 0.2s;
        position: absolute;
        top: 15px;
        right: 15px;
      }

      .close-btn:hover {
        color: #0f172a;
      }

      /* Mobile Adjustments */
      @media (max-width: 750px) {
        .calendar-wrapper {
          margin-top: 90px;
          width: 95%;
        }
        .calendar-header {
          padding: 20px 15px;
        }
        .calendar-body {
          padding: 20px 15px;
        }
        .day {
          font-size: 0.9rem;
          border-radius: 10px;
        }
        #prev,
        #next {
          width: 35px;
          height: 35px;
        }

        /* Force Legend to single line on mobile */
        .holiday-legend {
          flex-wrap: nowrap;
          gap: 4px;
        }
        .legend-pill {
          font-size: 0.65rem;
          padding: 4px 8px;
          gap: 4px;
        }

        .touch-instruction {
          font-size: 0.75rem;
          margin-top: 20px;
        }
      }

    <script>
      // 1. Initialize an empty holidays object
      let holidays = {};

      // ==========================================
      // 🛠️ GOOGLE SHEET CONFIGURATION
      // ==========================================
      // Replace this with your actual Google Sheet ID
      const sheetId = "1rrXZy1QMuDDgEdHF2AzUCcqK0syB90IOQN8k2e26m-s";
      const sheetName = "Sheet1";
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${sheetName}`;

      // ==========================================
      // 📅 ACADEMIC SESSION LOGIC (APRIL to MARCH)
      // ==========================================
      let currentDate = new Date();
      let currentYear = currentDate.getFullYear();
      let academicStartYear =
        currentDate.getMonth() < 3 ? currentYear - 1 : currentYear;

      const startDate = new Date(academicStartYear, 3);
      const endDate = new Date(academicStartYear + 1, 2);

      if (currentDate < startDate) currentDate = new Date(startDate);
      if (currentDate > endDate) currentDate = new Date(endDate);

      // ==========================================
      // 🎯 DOM ELEMENTS
      // ==========================================
      const calendar = document.getElementById("calendar");
      const monthYear = document.getElementById("month-year");
      const prevButton = document.getElementById("prev");
      const nextButton = document.getElementById("next");
      const modal = document.getElementById("holiday-info");
      const overlay = document.getElementById("overlay");
      const modalContent = document.getElementById("holiday-reason");
      const closeModal = document.querySelector(".close-btn");

      const weekdays = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
      const months = [
        "January",
        "February",
        "March",
        "April",
        "May",
        "June",
        "July",
        "August",
        "September",
        "October",
        "November",
        "December",
      ];

      // --- Helper to format Date objects back to YYYY-MM-DD for the grid ---
      const formatDateObj = (d) => {
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
      };

      // ==========================================
      // 🔄 FETCH DATA FROM GOOGLE SHEETS
      // ==========================================
      async function loadHolidays() {
        try {
          const response = await fetch(url);
          const text = await response.text();
          const jsonData = JSON.parse(text.substr(47).slice(0, -2));
          const newHolidays = {};

          jsonData.table.rows.forEach((row) => {
            if (row.c[0] && row.c[1] && row.c[2]) {
              const rawDate = String(row.c[0].v).trim();
              const type = row.c[1].v.trim();
              const name = row.c[2].v.trim();

              // --- RANGE LOGIC: Check if the string contains " to " ---
              if (rawDate.toLowerCase().includes(" to ")) {
                const dateParts = rawDate.toLowerCase().split(" to ");
                const startStr = dateParts[0].trim().split(/[-/]/);
                const endStr = dateParts[1].trim().split(/[-/]/);

                if (startStr.length === 3 && endStr.length === 3) {
                  let start = new Date(
                    startStr[2],
                    startStr[1] - 1,
                    startStr[0],
                  );
                  let end = new Date(endStr[2], endStr[1] - 1, endStr[0]);

                  let loopDate = new Date(start);
                  while (loopDate <= end) {
                    const dateKey = formatDateObj(loopDate);
                    if (!newHolidays[dateKey]) newHolidays[dateKey] = [];
                    newHolidays[dateKey].push({ type: type, name: name });
                    loopDate.setDate(loopDate.getDate() + 1);
                  }
                }
              }
              // --- SINGLE DATE LOGIC ---
              else {
                const parts = rawDate.split(/[-/]/);
                if (parts.length === 3) {
                  const dateKey = `${parts[2]}-${parts[1].padStart(2, "0")}-${parts[0].padStart(2, "0")}`;
                  if (!newHolidays[dateKey]) newHolidays[dateKey] = [];
                  newHolidays[dateKey].push({ type: type, name: name });
                }
              }
            }
          });

          holidays = newHolidays;
          renderCalendar(currentDate);
        } catch (error) {
          console.error("Error fetching holidays:", error);
          calendar.innerHTML =
            "<p style='grid-column: 1 / -1; color: red;'>Error loading calendar data. Please try again later.</p>";
        }
      }

      // ==========================================
      // 🎨 RENDER CALENDAR UI
      // ==========================================
      function renderCalendar(date) {
        calendar.innerHTML = "";

        const firstDay = new Date(
          date.getFullYear(),
          date.getMonth(),
          1,
        ).getDay();
        const daysInMonth = new Date(
          date.getFullYear(),
          date.getMonth() + 1,
          0,
        ).getDate();

        monthYear.textContent = `${months[date.getMonth()]} ${date.getFullYear()}`;

        weekdays.forEach((day) => {
          const weekdayDiv = document.createElement("div");
          weekdayDiv.className = "weekday";
          weekdayDiv.textContent = day;
          calendar.appendChild(weekdayDiv);
        });

        for (let i = 0; i < firstDay; i++) {
          calendar.appendChild(document.createElement("div"));
        }

        for (let day = 1; day <= daysInMonth; day++) {
          const dayDiv = document.createElement("div");
          const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;

          dayDiv.className = "day";
          dayDiv.textContent = day;

          if (holidays[dateStr] && holidays[dateStr].length > 0) {
            if (holidays[dateStr].length > 1) {
              dayDiv.classList.add("multiple-holiday");
            } else if (holidays[dateStr][0].type === "pure") {
              dayDiv.classList.add("fully-closed-holiday");
            } else if (holidays[dateStr][0].type === "observable") {
              dayDiv.classList.add("observable-holiday");
            }
            dayDiv.dataset.date = dateStr;
          }

          if (
            new Date(date.getFullYear(), date.getMonth(), day).getDay() === 0
          ) {
            dayDiv.classList.add("sunday");
          }

          calendar.appendChild(dayDiv);
        }

        prevButton.disabled =
          date.getFullYear() === startDate.getFullYear() &&
          date.getMonth() === startDate.getMonth();
        nextButton.disabled =
          date.getFullYear() === endDate.getFullYear() &&
          date.getMonth() === endDate.getMonth();
      }

      // ==========================================
      // 🖱️ EVENT LISTENERS
      // ==========================================
      prevButton.addEventListener("click", () => {
        currentDate.setMonth(currentDate.getMonth() - 1);
        renderCalendar(currentDate);
      });

      nextButton.addEventListener("click", () => {
        currentDate.setMonth(currentDate.getMonth() + 1);
        renderCalendar(currentDate);
      });

      calendar.addEventListener("click", (event) => {
        const target = event.target;
        if (target.classList.contains("day") && target.dataset.date) {
          const dateStr = target.dataset.date;
          const holidayList = holidays[dateStr];

          if (holidayList) {
            const holidayText = holidayList
              .map(
                (holiday) =>
                  `• ${holiday.name} (${holiday.type === "pure" ? "Full Holiday" : "Observance"})`,
              )
              .join("<br><br>");

            modalContent.innerHTML = holidayText;
            modal.style.display = "block";
            overlay.style.display = "block";
          }
        }
      });

      const hideModal = () => {
        modal.style.display = "none";
        overlay.style.display = "none";
      };

      closeModal.addEventListener("click", hideModal);
      overlay.addEventListener("click", hideModal);

      // ==========================================
      // 🚀 START THE APP
      // ==========================================
      loadHolidays();
    </script>
